name: Publish to npm

# Publishes @lrstack/lrlayout to npm whenever you publish a GitHub Release.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret is stored anywhere.
# You can also run it by hand from the Actions tab (bump the version first).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # Trusted publishing needs Node >= 22.14.0
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; sass builds dist/ via prepublishOnly.
      - run: npm install --global npm@latest sass

      - run: npm publish
